name: FLiNG Trainer Auto-Scraper Pipeline

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Pinpoint scrape a single target FLiNG trainer URL'
        required: false
        default: ''

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install scraper dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pefile supabase python-dotenv

    - name: Run Crawler & Auto-Translation Pipeline
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        if [ -n "${{ github.event.inputs.target_url }}" ]; then
          python scripts/scraper.py --url "${{ github.event.inputs.target_url }}"
        else
          python scripts/scraper.py
        fi

